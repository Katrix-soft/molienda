  :root{--cream:#fdf8f2;--gold:#c4973a;--dark:#1a1208;--muted:#7a6a50;--border:#e8d9c0;--card:#fff8f0}

  .app{max-width:680px;margin:0 auto;padding:0 0 2rem}
  .header{text-align:center;padding:2rem 1rem 1rem;border-bottom:1px solid var(--border)}
  .logo{font-family:'Playfair Display',serif;font-size:28px;font-weight:600;color:var(--dark);letter-spacing:0.02em}
  .logo span{font-style:italic;color:var(--gold)}
  .tagline{font-size:12px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-top:4px}
  .cats{display:flex;gap:6px;overflow-x:auto;padding:1rem;scrollbar-width:none;border-bottom:1px solid var(--border)}

  .cat-btn{white-space:nowrap;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--muted);cursor:pointer;transition:all .2s;font-weight:400}
  .cat-btn.active{background:var(--dark);color:var(--cream);border-color:var(--dark)}
  .section-title{font-family:'Playfair Display',serif;font-size:18px;padding:1.2rem 1rem 0.5rem;color:var(--dark)}
  .items{display:flex;flex-direction:column;gap:0}
  .item{display:flex;align-items:center;justify-content:space-between;padding:10px 1rem;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .15s}
  .item:hover{background:var(--card)}
  .item-left{flex:1}
  .item-name{font-size:14px;font-weight:500;color:var(--dark)}
  .item-desc{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
  .item-price{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:var(--gold);white-space:nowrap;margin-left:12px}
  .item-price.free{font-size:11px;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400}
  .badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;margin-left:6px;vertical-align:middle;font-weight:500}
  .badge-sin-tacc{background:#e8f5e9;color:#2e7d32}
  .badge-vegan{background:#f3e5f5;color:#6a1b9a}
  .promo-card{margin:8px 1rem;border-radius:12px;border:1px solid var(--border);background:var(--card);overflow:hidden;cursor:pointer;transition:box-shadow .2s}
  .promo-card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.08)}
  .promo-header{padding:12px 14px 8px;display:flex;justify-content:space-between;align-items:flex-start}
  .promo-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:600}
  .promo-price{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold);font-weight:600}
  .promo-includes{padding:0 14px 12px;font-size:12px;color:var(--muted);line-height:1.6}
  .divider-label{display:flex;align-items:center;gap:8px;padding:0.8rem 1rem 0;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
  .divider-label::after{content:'';flex:1;height:0.5px;background:var(--border)}
  .info-strip{background:var(--dark);color:var(--cream);padding:10px 1rem;display:flex;align-items:center;justify-content:space-between;font-size:12px;margin-top:1rem}
  .info-strip a{color:var(--gold);text-decoration:none;font-weight:500}
  .search-wrap{padding:0.8rem 1rem 0}
  .search-input{width:100%;padding:9px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--card);color:var(--dark);outline:none}
  .search-input:focus{border-color:var(--gold)}
  .empty{padding:2rem 1rem;text-align:center;color:var(--muted);font-size:13px;font-style:italic}
  .promos-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 0}
  @media(max-width:400px){.promos-grid{grid-template-columns:1fr}}
</style>

const cats = Object.keys(DATA);
let active = cats[0];
let search = "";

function fmt(p){
  if(!p) return "Consultar";
  return "$"+p.toLocaleString('es-AR');
}

function tagBadge(t){
  if(t==="sin-tacc") return `<span class="badge badge-sin-tacc">Sin TACC</span>`;
  if(t==="vegan") return `<span class="badge badge-vegan">Vegano</span>`;
  return "";
}

function renderCats(){
  const el = document.getElementById("cats");
  el.innerHTML = cats.map(c=>`<button class="cat-btn${c===active?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function setCat(c){
  active=c; search=""; document.getElementById("search").value=""; renderCats(); renderContent();
}

function doSearch(v){
  search=v.trim().toLowerCase();
  if(search){active=null; renderCats();}
  else{active=cats[0]; renderCats();}
  renderContent();
}

function renderContent(){
  const el = document.getElementById("content");
  if(search){
    let html="";
    let found=0;
    cats.forEach(cat=>{
      const sec = DATA[cat];
      const matches = sec.items.filter(i=>
        i.name.toLowerCase().includes(search)||(i.desc||"").toLowerCase().includes(search)
      );
      if(matches.length){
        found+=matches.length;
        html+=`<div class="divider-label">${cat}</div>`;
        if(sec.type==="promos"){
          html+=`<div class="promos-grid">`+matches.map(renderPromo).join("")+`</div>`;
        } else {
          html+=`<div class="items">`+matches.map(renderItem).join("")+`</div>`;
        }
      }
    });
    el.innerHTML = found ? html : `<div class="empty">Sin resultados para "${search}"</div>`;
    return;
  }
  const sec = DATA[active];
  let html = `<div class="section-title">${active}</div>`;
  if(sec.type==="promos"){
    html+=`<div class="promos-grid">`+sec.items.map(renderPromo).join("")+`</div>`;
  } else {
    html+=`<div class="items">`+sec.items.map(renderItem).join("")+`</div>`;
  }
  el.innerHTML = html;
}

function renderPromo(i){
  return `<div class="promo-card">
    <div class="promo-header">
      <div class="promo-name">${i.name}${i.tag?tagBadge(i.tag):""}</div>
      <div class="promo-price">${i.price?fmt(i.price):"Consultar"}</div>
    </div>
    ${i.desc?`<div class="promo-includes">${i.desc}</div>`:""}
  </div>`;
}

function renderItem(i){
  return `<div class="item">
    <div class="item-left">
      <div class="item-name">${i.name}${i.tag?tagBadge(i.tag):""}</div>
      ${i.desc?`<div class="item-desc">${i.desc}</div>`:""}
    </div>
    <div class="item-price${!i.price?" free":""}">${i.price?fmt(i.price):(i.desc&&i.desc.includes("Consultar")?"Consultar":fmt(i.price))}</div>
  </div>`;
}

renderCats();
renderContent();
</script>
